name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository (FULL history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      # 🔍 Show version being built
      - name: Show package version
        run: grep version pyproject.toml

      # 🔍 Build package
      - name: Build package
        run: python -m build

      - name: List dist files
        run: ls -lah dist/

      # 🚨 Ensure tag matches version
      - name: Verify version matches release tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=$(grep version pyproject.toml | cut -d '"' -f2)
          echo "Tag: $TAG"
          echo "Version: $VERSION"
          if [[ "$TAG" != *"$VERSION"* ]]; then
            echo "❌ Version mismatch between tag and pyproject.toml"
            exit 1
          fi

      # ✅ FIXED AUTH (THIS WAS YOUR BUG)
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: false
